<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kiki850">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1d2348">
<link rel="manifest" id="manifest-link">
<title>Kiki850 — TOEIC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--night:#1d2348;--night2:#2a3168;--gold:#f6b53c;--gold-soft:#fcd98c;--gold-deep:#e09a1f;--cream:#fbf6ec;--cream2:#f2e7d3;--paper:#fffdf8;--ink:#1b1e34;--muted:#7e84a3;--sage:#36a07c;--sage-soft:#d6efe4;--berry:#e15f7c;--berry-soft:#fbe0e6;--peri:#6f6ce6;--peri-soft:#e6e5fb;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#1d2348;font-family:'Plus Jakarta Sans',system-ui,sans-serif;}
.kiki-root{color:var(--ink);min-height:100vh;min-height:100dvh;background:radial-gradient(120% 80% at 50% -10%,#2a3168 0%,#1d2348 55%,#161b3a 100%);display:flex;justify-content:center;}
.phone{width:100%;max-width:470px;min-height:100vh;min-height:100dvh;background:var(--cream);overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;}
@media(min-width:520px){.phone{min-height:880px;margin:24px 0;border-radius:34px;}}
.scroll{flex:1;overflow-y:auto;padding:0 18px 130px;}.scroll::-webkit-scrollbar{width:0;}
.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--cream) 70%,rgba(251,246,236,0));padding:max(env(safe-area-inset-top),18px) 0 12px;display:flex;align-items:center;gap:10px;}
.brand{font-family:'Fraunces',serif;font-weight:800;font-size:21px;letter-spacing:-.5px;}.brand b{color:var(--gold-deep);}
.pill{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12.5px;padding:7px 11px;border-radius:999px;}
.pill.streak{background:var(--berry-soft);color:#c2425f;}.pill.xp{background:var(--peri-soft);color:#4b48b8;}.pill.lvl{background:var(--gold-soft);color:#7a4e06;font-size:11px;}
.spacer{flex:1;}
/* Splash */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:44px 24px;min-height:100dvh;}
.splash-title{font-family:'Fraunces',serif;font-weight:900;font-size:36px;letter-spacing:-.5px;margin:18px 0 8px;}.splash-title b{color:var(--gold-deep);}
.splash-sub{font-size:15px;color:var(--muted);line-height:1.65;max-width:300px;margin-bottom:36px;}
.divider{display:flex;align-items:center;gap:10px;width:100%;margin:14px 0;}.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--cream2);}.divider span{font-size:12px;color:var(--muted);font-weight:600;}
/* Assessment */
.shead{display:flex;align-items:center;gap:12px;padding:max(env(safe-area-inset-top),18px) 18px 8px;}
.xclose{background:none;border:none;font-size:26px;color:var(--muted);cursor:pointer;line-height:1;}
.pbar{flex:1;height:12px;background:var(--cream2);border-radius:999px;overflow:hidden;}.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:999px;transition:width .4s;}
.progress-mini{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:20px;}
.progress-mini .dot{width:9px;height:9px;border-radius:50%;background:var(--cream2);flex-shrink:0;transition:background .2s;}
.progress-mini .dot.done{background:var(--gold);}.progress-mini .dot.cur{background:var(--night2);transform:scale(1.35);}
/* Assess result */
.assess-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 18px;}
.assess-title{font-family:'Fraunces',serif;font-weight:800;font-size:24px;margin:14px 0 5px;}
.assess-score{font-family:'Space Mono';font-size:13px;color:var(--muted);margin-bottom:4px;}
.level-card{border-radius:22px;padding:20px 22px;margin:16px 0 14px;text-align:left;width:100%;}
.level-card.b1{background:linear-gradient(135deg,#2a3168,#3d4a9a);}.level-card.b1b2{background:linear-gradient(135deg,#1d6b5e,#2a9a80);}.level-card.b2{background:linear-gradient(135deg,#6b4a00,#e09a1f);}
.level-name{font-family:'Space Mono',monospace;font-weight:700;font-size:23px;color:#fff;line-height:1.2;}
.level-toeic{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;}.level-desc{font-size:13.5px;color:rgba(255,255,255,.9);margin-top:10px;line-height:1.5;}
.reco-bar{background:var(--night);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:flex-start;gap:11px;text-align:left;width:100%;}
.reco-icon{font-size:20px;flex-shrink:0;margin-top:1px;}.reco-text{font-size:13px;font-weight:600;color:var(--cream);line-height:1.45;}.reco-text span{color:var(--gold-soft);}
/* Scorecard */
.scorecard{background:var(--night);color:var(--cream);border-radius:24px;padding:20px;margin:4px 0 16px;position:relative;overflow:hidden;}
.scorecard::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(246,181,60,.28),transparent 70%);}
.score-num{font-family:'Space Mono',monospace;font-size:44px;font-weight:700;line-height:1;color:var(--gold);}
.score-lbl{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#aab0d8;}
.gaugewrap{display:flex;gap:16px;align-items:center;}.gaugebar{flex:1;height:11px;background:#11152e;border-radius:999px;overflow:hidden;margin-top:6px;}
.gaugefill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-deep),var(--gold) 70%,var(--gold-soft));transition:width .9s cubic-bezier(.2,.8,.2,1);}
.gauge-meta{font-size:11.5px;color:#aab0d8;margin-top:7px;display:flex;justify-content:space-between;}
/* Sections/units */
.sectionhead{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--night);color:var(--cream);border:none;border-radius:18px;padding:15px 16px;margin:10px 0 0;cursor:pointer;}
.sdot{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;background:rgba(255,255,255,.1);flex-shrink:0;}
.stitle{font-family:'Fraunces',serif;font-weight:700;font-size:15.5px;line-height:1.15;}.ssub{font-size:11.5px;color:#aab0d8;margin-top:2px;}.scount{font-family:'Space Mono';font-size:12px;color:var(--gold);font-weight:700;}
.chev{transition:transform .25s;color:#aab0d8;font-size:13px;}.chev.open{transform:rotate(90deg);}
.unitwrap{padding:8px 0 2px;}
.unit{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--cream2);border-radius:17px;padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:transform .12s;}
.unit:not(.locked):active{transform:scale(.985);}.unit.locked{opacity:.5;cursor:not-allowed;}.unit.done{border-color:var(--sage-soft);}.unit.recommended{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-soft);}
.u-emoji{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.u-title{font-weight:700;font-size:14px;line-height:1.2;}.u-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.u-prog{height:5px;background:var(--cream2);border-radius:999px;overflow:hidden;margin-top:7px;}.u-prog>i{display:block;height:100%;background:var(--sage);border-radius:999px;transition:width .5s;}
.u-right{flex-shrink:0;color:var(--muted);font-weight:800;font-size:12px;}.chk{width:24px;height:24px;border-radius:50%;background:var(--sage);display:grid;place-items:center;}
/* Buttons */
.btn{font-family:inherit;font-weight:800;border:none;border-radius:16px;cursor:pointer;font-size:16px;padding:16px;width:100%;transition:transform .12s;}.btn:active{transform:translateY(2px);}
.btn-gold{background:var(--gold);color:#3a2a06;box-shadow:0 5px 0 var(--gold-deep);}.btn-gold:active{box-shadow:0 1px 0 var(--gold-deep);}
.btn-night{background:var(--night);color:var(--cream);box-shadow:0 5px 0 #11152e;}.btn-night:active{box-shadow:0 1px 0 #11152e;}
.btn-ghost{background:transparent;color:var(--night2);border:1.5px solid var(--cream2);box-shadow:none;}
.btn-sage{background:var(--sage);color:#fff;box-shadow:0 5px 0 #277a5d;}.btn-sage:active{box-shadow:0 1px 0 #277a5d;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}
/* Questions */
.qtype{font-size:11px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:6px;}
.qprompt{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.3;margin-bottom:4px;}.qhint{font-size:13px;color:var(--muted);margin-bottom:16px;font-style:italic;}
.sentence{background:var(--paper);border:1.5px solid var(--cream2);border-radius:18px;padding:17px;font-size:18px;line-height:1.7;margin-bottom:16px;}
.blank{display:inline-block;min-width:60px;border-bottom:3px solid var(--gold);text-align:center;font-weight:800;color:var(--gold-deep);}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--paper);border:2px solid var(--cream2);border-radius:15px;padding:14px 15px;margin-bottom:10px;cursor:pointer;font-size:15.5px;font-weight:600;transition:transform .1s,border-color .15s,background .15s;}
.opt:active{transform:scale(.99);}.opt .lab{width:27px;height:27px;border-radius:9px;background:var(--cream2);color:var(--night2);display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0;}
.opt.correct{border-color:var(--sage);background:var(--sage-soft);}.opt.correct .lab{background:var(--sage);color:#fff;}
.opt.wrong{border-color:var(--berry);background:var(--berry-soft);}.opt.wrong .lab{background:var(--berry);color:#fff;}
.opt[disabled]{cursor:default;}
.fillin{width:100%;font-family:inherit;font-size:18px;font-weight:700;text-align:center;padding:16px;border-radius:16px;border:2px solid var(--cream2);background:var(--paper);color:var(--ink);outline:none;}
.fillin:focus{border-color:var(--gold);}.fillin.ok{border-color:var(--sage);background:var(--sage-soft);}.fillin.no{border-color:var(--berry);background:var(--berry-soft);}
.answerzone{min-height:60px;background:var(--paper);border:2px dashed var(--cream2);border-radius:16px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;margin-bottom:14px;}
.answerzone.empty{display:grid;place-items:center;color:var(--muted);font-style:italic;font-size:14px;}
.bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.chip{font-family:inherit;font-weight:700;font-size:14px;padding:10px 13px;border-radius:12px;border:2px solid var(--cream2);background:var(--cream);cursor:pointer;transition:transform .1s;}
.chip:active{transform:scale(.94);}.chip.placed{background:var(--peri-soft);border-color:#cfcdf6;color:#4b48b8;}.chip.used{opacity:.28;pointer-events:none;}
/* Audio */
.listenbig{width:110px;height:110px;border-radius:50%;border:none;cursor:pointer;margin:6px auto 16px;display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,var(--night2),var(--night));color:var(--gold);box-shadow:0 10px 30px rgba(29,35,72,.35);position:relative;}
.listenbig.playing::before,.listenbig.playing::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--gold);opacity:.6;animation:ping 1.4s ease-out infinite;}.listenbig.playing::after{animation-delay:.6s;}
@keyframes ping{to{inset:-26px;opacity:0;}}
.replay{display:flex;align-items:center;gap:7px;justify-content:center;background:none;border:none;color:var(--peri);font-weight:700;font-size:14px;cursor:pointer;margin:0 auto 16px;}
.transcript{background:var(--peri-soft);border-radius:14px;padding:12px 14px;font-size:14px;margin-top:4px;line-height:1.5;}
/* Feedback */
.feedback{position:sticky;bottom:0;left:0;right:0;padding:16px 18px max(env(safe-area-inset-bottom),18px);background:var(--paper);border-top:1.5px solid var(--cream2);animation:slideUp .3s ease;}
.feedback.ok{background:var(--sage-soft);border-top-color:#bfe6d5;}.feedback.no{background:var(--berry-soft);border-top-color:#f5cdd6;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.fb-title{font-family:'Fraunces',serif;font-weight:800;font-size:18px;display:flex;gap:8px;align-items:center;}.fb-title.ok{color:#1d7a59;}.fb-title.no{color:#bf3f5c;}
.fb-explain{font-size:14px;color:#444;margin:6px 0 14px;line-height:1.5;}.fb-explain b{color:var(--night2);}
.kiki-row{display:flex;align-items:flex-end;gap:11px;margin:8px 0 16px;}
.bubble{background:var(--paper);border:1.5px solid var(--cream2);border-radius:18px 18px 18px 4px;padding:12px 15px;font-size:14px;font-weight:600;line-height:1.4;flex:1;box-shadow:0 4px 14px rgba(29,35,72,.06);}
/* Results */
.result-wrap{text-align:center;padding:28px 22px;}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.conf{position:absolute;width:9px;height:14px;border-radius:2px;top:-20px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(900px) rotate(540deg);opacity:.2;}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:20px 0;}
.stat{background:var(--paper);border:1.5px solid var(--cream2);border-radius:17px;padding:15px;}.stat .v{font-family:'Space Mono';font-size:25px;font-weight:700;color:var(--night2);}.stat .l{font-size:11.5px;color:var(--muted);margin-top:2px;}
.delta{display:inline-flex;align-items:center;gap:6px;background:var(--sage-soft);color:#1d7a59;font-weight:800;padding:8px 14px;border-radius:999px;font-size:13.5px;}
.footnote{font-size:11px;color:var(--muted);text-align:center;margin:16px 4px 0;line-height:1.5;}
.install-banner{background:var(--night);color:var(--cream);border-radius:16px;padding:14px 16px;margin:0 0 16px;font-size:13px;line-height:1.5;}.install-banner b{color:var(--gold-soft);}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script>
(function(){
  /* ===== Dessin de Kiki sur canvas (PNG 512px) ===== */
  function drawKiki(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    const s=size/512; // facteur d'échelle

    // Fond arrondi bleu nuit
    ctx.fillStyle='#1d2348';
    ctx.beginPath();
    const r=80*s;
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.arcTo(size,0,size,r,r);
    ctx.lineTo(size,size-r);ctx.arcTo(size,size,size-r,size,r);
    ctx.lineTo(r,size);ctx.arcTo(0,size,0,size-r,r);
    ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);
    ctx.closePath();ctx.fill();

    function E(cx,cy,rx,ry,col){
      ctx.save();ctx.translate(cx*s,cy*s);ctx.scale(rx*s,ry*s);
      ctx.beginPath();ctx.arc(0,0,1,0,Math.PI*2);ctx.restore();
      ctx.fillStyle=col;ctx.fill();
    }
    function C(cx,cy,r,col){
      ctx.beginPath();ctx.arc(cx*s,cy*s,r*s,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
    }

    // Ailes (ellipses latérales orange)
    E(84,310,42,70,'#e09a1f');
    E(428,310,42,70,'#e09a1f');

    // Corps principal
    E(256,295,148,165,'#f6b53c');

    // Ventre clair
    E(256,315,105,122,'#fde7bf');

    // Oreilles (triangles)
    ctx.fillStyle='#e09a1f';
    ctx.beginPath();ctx.moveTo(148*s,165*s);ctx.lineTo(168*s,72*s);ctx.lineTo(214*s,152*s);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(364*s,165*s);ctx.lineTo(344*s,72*s);ctx.lineTo(298*s,152*s);ctx.closePath();ctx.fill();

    // Cercles des yeux (blanc-cassé)
    C(198,242,68,'#fffaf0');C(314,242,68,'#fffaf0');
    // Contour des yeux
    ctx.strokeStyle='#e7c98a';ctx.lineWidth=4*s;
    ctx.beginPath();ctx.arc(198*s,242*s,68*s,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(314*s,242*s,68*s,0,Math.PI*2);ctx.stroke();

    // Pupilles
    C(198,242,34,'#1d2348');C(314,242,34,'#1d2348');

    // Reflets (blanc)
    C(212,228,11,'#ffffff');C(326,228,11,'#ffffff');

    // Bec
    ctx.fillStyle='#e08a2a';
    ctx.beginPath();ctx.moveTo(256*s,266*s);ctx.lineTo(228*s,305*s);ctx.lineTo(284*s,305*s);ctx.closePath();ctx.fill();

    // Pattes
    ctx.strokeStyle='#e08a2a';ctx.lineWidth=7*s;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(224*s,490*s);ctx.lineTo(224*s,456*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(204*s,490*s);ctx.lineTo(244*s,490*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(288*s,490*s);ctx.lineTo(288*s,456*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(268*s,490*s);ctx.lineTo(308*s,490*s);ctx.stroke();

    // Petites joues roses
    ctx.fillStyle='rgba(245,158,139,0.5)';
    ctx.beginPath();ctx.arc(140*s,290*s,28*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(372*s,290*s,28*s,0,Math.PI*2);ctx.fill();

    return c;
  }

  // Génère l'icône 512px et 180px
  const icon512=drawKiki(512);
  const icon180=drawKiki(180);
  const png512=icon512.toDataURL('image/png');
  const png180=icon180.toDataURL('image/png');

  // Manifest PWA (Android + Chrome)
  const m={
    name:"Kiki850 — TOEIC",short_name:"Kiki850",
    description:"Entraînement TOEIC · objectif 850",
    start_url:"./",display:"standalone",
    background_color:"#1d2348",theme_color:"#1d2348",
    orientation:"portrait-primary",
    icons:[
      {src:png512,sizes:"512x512",type:"image/png",purpose:"any maskable"},
      {src:png180,sizes:"180x180",type:"image/png",purpose:"any"}
    ]
  };
  const blob=new Blob([JSON.stringify(m)],{type:'application/json'});
  document.getElementById('manifest-link').href=URL.createObjectURL(blob);

  // Apple touch icon (iOS home screen)
  const li=document.createElement('link');
  li.rel='apple-touch-icon';li.sizes='180x180';li.href=png180;
  document.head.appendChild(li);

  // Favicon
  const fav=document.createElement('link');
  fav.rel='icon';fav.type='image/png';fav.href=drawKiki(64).toDataURL('image/png');
  document.head.appendChild(fav);
})();
</script>
<script type="text/babel" data-presets="react">

const {useState,useEffect,useMemo,useCallback}=React;
const norm=(s)=>(s||"").trim().toLowerCase().replace(/\s+/g," ").replace(/[.,!?;:]/g,"").replace(/[\u2019']/g,"'");
const pick=(a)=>a[Math.floor(Math.random()*a.length)];
const TARGET=850,START=600;
function speak(t,r=0.9){try{const s=window.speechSynthesis;s.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=r;u.pitch=1;const v=s.getVoices().find(x=>/en[-_]/i.test(x.lang));if(v)u.voice=v;s.speak(u);return true;}catch(e){return false;}}

/* == KIKI == */
function Kiki({mood="idle",size=96}){
  const happy=mood==="happy"||mood==="celebrate",oops=mood==="oops",think=mood==="think",blink=mood==="idle";
  return(
    <svg width={size} height={size} viewBox="0 0 120 120" style={{flexShrink:0}} aria-label="Kiki">
      <defs>
        <radialGradient id="ky"><stop offset="0%" stopColor="#fde7bf"/><stop offset="100%" stopColor="#f6cf86"/></radialGradient>
        <linearGradient id="kx" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f6b53c"/><stop offset="100%" stopColor="#e09a1f"/></linearGradient>
      </defs>
      <rect x="22" y="104" width="76" height="7" rx="3.5" fill="#8a6a3a"/>

const ALL_UNITS=SECTIONS.flatMap(s=>s.units);
const totalQs=ALL_UNITS.reduce((n,u)=>n+u.qs.length,0);
const unitSection={};
SECTIONS.forEach(s=>s.units.forEach((u,i)=>{unitSection[u.id]={sectionId:s.id,index:i};}));
const KIKI_HOME=["Hou hou ! Tout le programme est l\u00e0 !","On vise le 850, une section \u00e0 la fois.","R\u00e9gularit\u00e9 de chouette : un peu chaque jour !","Choisis un chapitre, je veille sur tes progr\u00e8s."];
const KIKI_OK=["Bravo, joli r\u00e9flexe !","Hou hou, parfait !","Tu progresses vers 850 !","Excellent, continue !","C'est tout bon !"];
const KIKI_NO=["Pas grave, on apprend !","Presque ! Lis l'astuce.","L'erreur fait partie du voyage.","Courage, la prochaine est pour toi !"];

/* == STORAGE == */
const STORE="kiki_v4";
function loadSave(){try{return JSON.parse(localStorage.getItem(STORE)||"{}");}catch(e){return {};}}
function doSave(d){try{localStorage.setItem(STORE,JSON.stringify(d));}catch(e){}}

/* == APP == */
function App(){
  const init=useMemo(loadSave,[]);
  const [screen,setScreen]=useState(init.assessed?"home":"splash");
  const [progress,setProgress]=useState(init.progress||{});
  const [xp,setXp]=useState(init.xp||0);
  const [bestStreak,setBestStreak]=useState(init.bestStreak||0);
  const [streak,setStreak]=useState(0);
  const [userLevel,setUserLevel]=useState(init.level||null);
  const [activeUnit,setActiveUnit]=useState(null);
  const [session,setSession]=useState(null);
  const [assessScore,setAssessScore]=useState(null);
  const [homeMsg]=useState(pick(KIKI_HOME));
  useEffect(()=>{try{window.speechSynthesis.getVoices();}catch(e){}},[]);
  const correctCount=useMemo(()=>Object.values(progress).reduce((n,p)=>n+(p.best||0),0),[progress]);
  const estScore=Math.min(TARGET,START+Math.round((correctCount/totalQs)*(TARGET-START)));
  const gaugePct=Math.round(((estScore-START)/(TARGET-START))*100);
  const getInitialUnlocks=(lvl)=>{
    if(!lvl||lvl.unlock<=1) return {};
    const fp={};
    SECTIONS.forEach(s=>s.units.slice(0,lvl.unlock-1).forEach(u=>{fp[u.id]={best:u.qs.length,done:true};}));
    return fp;
  };
  const isUnlocked=(unitId)=>{
    const info=unitSection[unitId];if(info.index===0) return true;
    const sec=SECTIONS.find(s=>s.id===info.sectionId);
    return !!progress[sec.units[info.index-1].id]?.done;
  };
  const isRecommended=(unitId)=>{
    if(!userLevel) return false;
    const info=unitSection[unitId];
    return info.index===userLevel.unlock-1||info.index===userLevel.unlock;
  };
  const startUnit=(unit)=>{setActiveUnit(unit);setSession({idx:0,correct:0,answers:[]});setStreak(0);setScreen("session");};
  const onAnswered=(ok)=>{
    setSession(s=>({...s,correct:s.correct+(ok?1:0),answers:[...s.answers,ok]}));
    if(ok){setStreak(v=>{const nv=v+1;setBestStreak(b=>Math.max(b,nv));return nv;});setXp(v=>v+10);}
    else setStreak(0);
  };
  const nextQuestion=()=>{
    setSession(s=>{
      const ni=s.idx+1;
      if(ni>=activeUnit.qs.length){finishSession(s);return s;}
      return{...s,idx:ni};
    });
  };
  const finishSession=(s)=>{
    const best=Math.max(progress[activeUnit.id]?.best||0,s.correct);
    const done=s.correct>=Math.ceil(activeUnit.qs.length*0.6)||progress[activeUnit.id]?.done;
    const np={...progress,[activeUnit.id]:{best,done}};
    setProgress(np);const nb=Math.max(bestStreak,streak);setBestStreak(nb);
    doSave({progress:np,xp:xp+s.correct*10,bestStreak:nb,level:userLevel,assessed:true});
    setScreen("results");
  };
  const onAssessmentDone=(score,lvl)=>{
    setAssessScore(score);setUserLevel(lvl);
    const initProg=getInitialUnlocks(lvl);setProgress(initProg);
    doSave({progress:initProg,xp:0,bestStreak:0,level:lvl,assessed:true});
    setScreen("assess_result");
  };
  const skipAssessment=()=>{doSave({progress:{},xp:0,bestStreak:0,level:null,assessed:true});setScreen("home");};
  return(
    <div className="kiki-root"><div className="phone">
      {screen==="splash"&&<Splash onAssess={()=>setScreen("assessment")} onSkip={skipAssessment}/>}
      {screen==="assessment"&&<Assessment onDone={onAssessmentDone} onBack={()=>setScreen("splash")}/>}
      {screen==="assess_result"&&<AssessResult score={assessScore} level={userLevel} onContinue={()=>setScreen("home")}/>}
      {screen==="home"&&<Home homeMsg={homeMsg} estScore={estScore} gaugePct={gaugePct} xp={xp} bestStreak={bestStreak} correctCount={correctCount} progress={progress} isUnlocked={isUnlocked} isRecommended={isRecommended} userLevel={userLevel} onStart={startUnit}/>}
      {screen==="session"&&activeUnit&&<Session unit={activeUnit} session={session} streak={streak} onAnswered={onAnswered} onNext={nextQuestion} onQuit={()=>{try{window.speechSynthesis.cancel();}catch(e){}setScreen("home");}}/>}
      {screen==="results"&&activeUnit&&<Results unit={activeUnit} session={session} estScore={estScore} onHome={()=>setScreen("home")} onReplay={()=>startUnit(activeUnit)}/>}
    </div></div>
  );
}

/* == SPLASH == */
function Splash({onAssess,onSkip}){
  return(
    <div className="splash">
      <Kiki mood="happy" size={120}/>
      <div className="splash-title">Kiki<b>850</b></div>
      <div className="splash-sub">Entra\u00eenement TOEIC complet<br/>Grammaire \u00b7 Vocabulaire \u00b7 \u00c9coute<br/>Objectif : score 850 \ud83e\udd89</div>
      <button className="btn btn-gold" onClick={onAssess}>\ud83c\udfaf \u00c9valuer mon niveau (2 min)</button>
      <div className="divider"><span>ou</span></div>
      <button className="btn btn-ghost" onClick={onSkip}>Commencer directement</button>
      <p style={{fontSize:11,color:"var(--muted)",marginTop:20,lineHeight:1.5}}>{totalQs} exercices \u00b7 14 chapitres grammaire \u00b7 Passif, Relatives \u00b7 20+ th\u00e8mes vocab<br/>Manuels S. Sitayeb (2026)</p>
    </div>
  );
}

/* == ASSESSMENT == */
function Assessment({onDone,onBack}){
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState([]);
  const q=ASSESS_QS[idx];
  const pct=Math.round((idx/ASSESS_QS.length)*100);
  const pickAnswer=(correct)=>{
    const newA=[...answers,correct];
    if(idx<ASSESS_QS.length-1){setAnswers(newA);setIdx(idx+1);}
    else{const score=newA.filter(Boolean).length;onDone(score,getLevel(score));}
  };
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div className="shead">
        <button className="xclose" onClick={onBack}>\u00d7</button>
        <div className="pbar"><i style={{width:`${pct}%`}}/></div>
        <span style={{font:"700 12px 'Space Mono'",color:"var(--muted)",flexShrink:0}}>{idx+1}/{ASSESS_QS.length}</span>
      </div>
      <div className="scroll" style={{paddingBottom:30}}>
        {idx===0&&<div className="kiki-row" style={{marginTop:6}}><Kiki mood="think" size={64}/><div className="bubble"><b style={{color:"var(--gold-deep)"}}>Test d'\u00e9valuation \u2014 </b>20 questions progressives pour calibrer ton parcours. Pas de correction pendant le test !</div></div>}
        <div style={{marginTop:idx===0?6:18}}>
          <div className="qtype" style={{color:"var(--peri)"}}>Niveau {"⭐".repeat(q.lvl)} \u00b7 Question {idx+1}/{ASSESS_QS.length}</div>
          {q.t==="mcq"&&<AssessMCQ key={idx} q={q} onAnswer={pickAnswer}/>}
          {q.t==="trans"&&<AssessTrans key={idx} q={q} onAnswer={pickAnswer}/>}
        </div>
        <div className="progress-mini">{ASSESS_QS.map((_,i)=><div key={i} className={`dot ${i<idx?"done":i===idx?"cur":""}`}/>)}</div>
      </div>
    </div>
  );
}
function AssessMCQ({q,onAnswer}){
  return(<>
    <div className="qprompt">Choisis la forme correcte.</div>
    <div className="sentence">{(q.s||"").split("___").map((p,i,arr)=>i<arr.length-1?<span key={i}>{p}<span className="blank">&nbsp;?&nbsp;</span></span>:<span key={i}>{p}</span>)}</div>
    {q.opts.map((o,i)=><button key={i} className="opt" onClick={()=>onAnswer(i===q.a)}><span className="lab">{"ABCD"[i]}</span>{o}</button>)}
  </>);
}
function AssessTrans({q,onAnswer}){
  return(<>
    <div className="qprompt">Que signifie ce mot en fran\u00e7ais ?</div>
    <div className="sentence" style={{textAlign:"center",fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:600}}>{q.word}</div>
    {q.opts.map((o,i)=><button key={i} className="opt" onClick={()=>onAnswer(i===q.a)}><span className="lab">{"ABCD"[i]}</span>{o}</button>)}
  </>);
}

/* == ASSESS RESULT == */

    <div className="scroll">
      <div className="assess-wrap">
        <Kiki mood={score>=14?"celebrate":"happy"} size={110}/>
        <div className="assess-title">R\u00e9sultat de ton \u00e9valuation</div>
        <div className="assess-score">{score}/{ASSESS_QS.length} bonnes r\u00e9ponses \u00b7 {"⭐".repeat(stars)}</div>
        <div className={`level-card ${level.code}`}>
          <div className="level-name">{level.name}</div>
          <div className="level-toeic">{level.toeic}</div>
          <div className="level-desc">{level.desc}</div>

        <div style={{width:"100%"}}>
          <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:15,marginBottom:10,textAlign:"left"}}>Ton programme personnalis\u00e9</div>
          {level.code==="b1"&&<>
            <div className="reco-bar"><div className="reco-icon">\ud83d\udcd8</div><div className="reco-text">Commence par <span>Se pr\u00e9senter</span> et <span>Donner son opinion</span> — les fondations.</div></div>

            <div className="reco-bar"><div className="reco-icon">\ud83c\udfa7</div><div className="reco-text">Lance l'\u00e9coute d\u00e8s que tu ma\u00eetrises les <span>temps verbaux</span>.</div></div>
          </>}
          {level.code==="b1b2"&&<>
            <div className="reco-bar"><div className="reco-icon">\ud83d\udd04</div><div className="reco-text">Focus sur le <span>conditionnel</span> et la <span>voix passive</span> — cl\u00e9s pour 700+.</div></div>

            <div className="reco-bar"><div className="reco-icon">\ud83c\udfa7</div><div className="reco-text">La compr\u00e9hension orale est accessible — commence les <span>dict\u00e9es</span>.</div></div>

            <div className="reco-bar"><div className="reco-icon">\ud83d\udd17</div><div className="reco-text">Travaille les <span>relatives</span> et l'<span>ordre des adjectifs</span> pour viser 800+.</div></div>

            <div className="reco-bar"><div className="reco-icon">\u270d\ufe0f</div><div className="reco-text">Les <span>dict\u00e9es</span> am\u00e9liorent ta discrimination auditive.</div></div>
          </>}
        </div>
        <button className="btn btn-gold" style={{marginTop:20,width:"100%"}} onClick={onContinue}>Commencer mon programme</button>
      </div>
    </div>
  );

        </div>
      </div>
      {SECTIONS.map(sec=>{
        const done=sec.units.filter(u=>progress[u.id]?.done).length;

        return(

            <button className="sectionhead" onClick={()=>setOpen(isOpen?null:sec.id)}>

              <div className={`chev ${isOpen?"open":""}`}>\u25b6</div>
            </button>
            {isOpen&&<div className="unitwrap">{sec.units.map(u=>{
              const p=progress[u.id];const unlocked=isUnlocked(u.id);const ud=p?.done;

              return(

                    {unlocked&&<div className="u-prog"><i style={{width:`${pct2}%`}}/></div>}
                  </div>
                  {ud?<div className="chk"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="3.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
                    :unlocked?<div className="u-right">{u.qs.length}\u2605</div>:null}
                </button>
              );
            })}</div>}
          </div>
        );
      })}
      <p className="footnote">Score estim\u00e9 = indicateur interne (600\u2192850), pas un score officiel ETS.<br/>{totalQs} exercices \u00b7 Contenu d'apr\u00e8s S. Sitayeb (2026) \u00b7 Audio : voix de l'appareil.</p>
    </div>
  );
}

/* == SESSION == */
function Session({unit,session,streak,onAnswered,onNext,onQuit}){
  const q=unit.qs[session.idx];
  const [state,setState]=useState("answering");
  const [wasCorrect,setWasCorrect]=useState(false);
  const [kikiMsg,setKikiMsg]=useState("");
  useEffect(()=>{setState("answering");},[session.idx]);
  const handleResult=(ok)=>{setWasCorrect(ok);setKikiMsg(ok?pick(KIKI_OK):pick(KIKI_NO));setState("done");onAnswered(ok);};
  const pct=Math.round((session.idx/unit.qs.length)*100);
  const typeLabel={mcq:"Question \u00e0 choix \u00b7 Partie 5",trans:"Vocabulaire & traduction",fill:"Texte \u00e0 trous",build:"Composition de phrase",listen:"Compr\u00e9hension orale",dictation:"Dict\u00e9e"}[q.t]||"Exercice";
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div className="shead">
        <button className="xclose" onClick={onQuit}>\u00d7</button>
        <div className="pbar"><i style={{width:`${pct}%`}}/></div>
        <span className="pill streak" style={{visibility:streak>=2?"visible":"hidden"}}>\ud83d\udd25{streak}</span>
      </div>
      <div className="scroll" style={{paddingBottom:30}}>
        {session.idx===0&&<div className="kiki-row" style={{marginTop:6}}><Kiki mood="think" size={64}/><div className="bubble"><b style={{color:"var(--gold-deep)"}}>Astuce de Kiki \u2014 </b>{unit.lesson}</div></div>}
        <div style={{marginTop:session.idx===0?6:18}}>
          <div className="qtype">{typeLabel}</div>
          <QuestionBody key={`${unit.id}-${session.idx}`} q={q} state={state} onResult={handleResult}/>
        </div>
      </div>
      {state==="done"&&<Feedback ok={wasCorrect} q={q} kikiMsg={kikiMsg} onNext={onNext} last={session.idx===unit.qs.length-1}/>}
    </div>
  );
}

function QuestionBody({q,state,onResult}){
  if(q.t==="mcq") return <MCQ q={q} state={state} onResult={onResult}/>;
  if(q.t==="trans") return <Trans q={q} state={state} onResult={onResult}/>;
  if(q.t==="fill") return <Fill q={q} state={state} onResult={onResult}/>;
  if(q.t==="build") return <Build q={q} state={state} onResult={onResult}/>;
  if(q.t==="listen") return <Listen q={q} state={state} onResult={onResult}/>;
  if(q.t==="dictation") return <Dictation q={q} state={state} onResult={onResult}/>;
  return null;
}

function Choices({opts,a,chosen,locked,pickOpt}){
  return opts.map((o,i)=>{
    let cls="opt";
    if(locked&&i===a) cls+=" correct"; else if(locked&&i===chosen) cls+=" wrong";
    return <button key={i} className={cls} disabled={locked} onClick={()=>{if(!locked) pickOpt(i);}}><span className="lab">{"ABCD"[i]}</span>{o}</button>;
  });
}
function rS(s){const parts=(s||"").split("___");return <span>{parts[0]}<span className="blank">&nbsp;?&nbsp;</span>{parts[1]}</span>;}
function MCQ({q,state,onResult}){const [c,sC]=useState(null);const lk=state==="done";return(<><div className="qprompt">{q.prompt||"Choisis la forme correcte."}</div><div className="sentence">{rS(q.s)}</div><Choices opts={q.opts} a={q.a} chosen={c} locked={lk} pickOpt={i=>{sC(i);onResult(i===q.a);}}/></>);}
function Trans({q,state,onResult}){const [c,sC]=useState(null);const lk=state==="done";return(<><div className="qprompt">{q.prompt||"Traduis en fran\u00e7ais."}</div><div className="sentence" style={{textAlign:"center",fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:600}}>{q.word}</div><Choices opts={q.opts} a={q.a} chosen={c} locked={lk} pickOpt={i=>{sC(i);onResult(i===q.a);}}/></>);}
function Fill({q,state,onResult}){
  const [val,sV]=useState("");const lk=state==="done";
  const ok=(q.accept||[q.a]).some(a=>norm(a)===norm(val));
  return(<>{q.hint&&<div className="qhint">{q.hint}</div>}<div className="qprompt">{q.prompt}</div><div className="sentence">{rS(q.s)}</div><input className={`fillin ${lk?(ok?"ok":"no"):""}`} placeholder="Tape ta r\u00e9ponse\u2026" value={val} disabled={lk} onChange={e=>sV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!lk&&ok!==undefined&&val.trim()&&onResult(ok)} autoCapitalize="off" autoCorrect="off" spellCheck="false"/>{!lk&&<button className="btn btn-night" style={{marginTop:14}} disabled={!val.trim()} onClick={()=>onResult(ok)}>Valider</button>}</>);
}
function Build({q,state,onResult}){
  const shuffled=useMemo(()=>{const arr=q.tokens.map((w,i)=>({w,i}));for(let k=arr.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[arr[k],arr[j]]=[arr[j],arr[k]];}return arr;},[q]);
  const [placed,setPlaced]=useState([]);const lk=state==="done";
  const words=placed.map(id=>shuffled.find(t=>t.i===id).w);
  const isOk=JSON.stringify(words)===JSON.stringify(q.a);
  return(<><div className="qhint">{q.fr}</div><div className={`answerzone ${placed.length===0?"empty":""}`}>{placed.length===0?"Tap les mots dans l'ordre\u2026":placed.map(id=><button key={id} className="chip placed" onClick={()=>!lk&&setPlaced(p=>p.filter(x=>x!==id))}>{shuffled.find(t=>t.i===id).w}</button>)}</div><div className="bank">{shuffled.map(t=><button key={t.i} className={`chip ${placed.includes(t.i)?"used":""}`} onClick={()=>!lk&&setPlaced(p=>[...p,t.i])}>{t.w}</button>)}</div>{!lk&&<button className="btn btn-night" style={{marginTop:14}} disabled={placed.length!==q.tokens.length} onClick={()=>onResult(isOk)}>Valider</button>}</>);
}
function PlayButton({text}){
  const [playing,setPlaying]=useState(false);
  const play=useCallback(()=>{const ok=speak(text);if(ok){setPlaying(true);setTimeout(()=>setPlaying(false),1200+text.length*55);}},[text]);
  useEffect(()=>{const t=setTimeout(play,300);return()=>clearTimeout(t);},[]);
  return(<><button className={`listenbig ${playing?"playing":""}`} onClick={play}><svg width="44" height="44" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button><button className="replay" onClick={play}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M1 4v6h6"/><path d="M3.5 10a9 9 0 1 1 .5 4"/></svg>R\u00e9\u00e9couter</button></>);
}
function Listen({q,state,onResult}){const [c,sC]=useState(null);const lk=state==="done";return(<><PlayButton text={q.audio}/><div className="qprompt" style={{fontSize:17,marginBottom:14}}>{q.q}</div><Choices opts={q.opts} a={q.a} chosen={c} locked={lk} pickOpt={i=>{sC(i);onResult(i===q.a);}}/></>);}
function Dictation({q,state,onResult}){
  const [val,sV]=useState("");const lk=state==="done";
  const ok=(q.accept||[q.a]).some(a=>norm(a)===norm(val));
  return(<><PlayButton text={q.audio}/><input className={`fillin ${lk?(ok?"ok":"no"):""}`} style={{textAlign:"left"}} placeholder="\u00c9cris la phrase\u2026" value={val} disabled={lk} onChange={e=>sV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!lk&&val.trim()&&onResult(ok)} autoCapitalize="off" autoCorrect="off" spellCheck="false"/>{!lk&&<button className="btn btn-night" style={{marginTop:14}} disabled={!val.trim()} onClick={()=>onResult(ok)}>Valider</button>}</>);
}

/* == FEEDBACK == */
function Feedback({ok,q,kikiMsg,onNext,last}){
  const showTx=q.t==="listen"||q.t==="dictation";
  return(
    <div className={`feedback ${ok?"ok":"no"}`}>
      <div className="kiki-row" style={{margin:"0 0 10px"}}><Kiki mood={ok?"happy":"oops"} size={52}/><div className="bubble">{kikiMsg}</div></div>
      <div className={`fb-title ${ok?"ok":"no"}`}>{ok?"\u2713 Correct !":"\u2717 \u00c0 revoir"}</div>
      <div className="fb-explain" dangerouslySetInnerHTML={{__html:(q.ex||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")}}/>
      {showTx&&<div className="transcript"><b>Transcription :</b> {q.audio}</div>}
      <button className={`btn ${ok?"btn-sage":"btn-gold"}`} style={{marginTop:12}} onClick={onNext}>{last?"Voir mes r\u00e9sultats":"Continuer"}</button>
    </div>
  );
}

/* == RESULTS == */
function Results({unit,session,estScore,onHome,onReplay}){
  const total=unit.qs.length,correct=session.correct,pct=Math.round((correct/total)*100),great=pct>=80;
  const confetti=useMemo(()=>Array.from({length:great?28:0}).map(()=>({left:Math.random()*100,delay:Math.random()*.6,dur:2.4+Math.random()*1.6,color:pick(["#f6b53c","#6f6ce6","#36a07c","#e15f7c","#fcd98c"])})),[great]);
  return(
    <div className="scroll" style={{position:"relative"}}>
      {great&&<div className="confetti">{confetti.map((c,i)=><span key={i} className="conf" style={{left:`${c.left}%`,background:c.color,animationDelay:`${c.delay}s`,animationDuration:`${c.dur}s`}}/>)}</div>}
      <div className="result-wrap">
        <Kiki mood={great?"celebrate":"happy"} size={120}/>
        <div className="bubble" style={{display:"inline-block",marginTop:14,borderRadius:18,textAlign:"center"}}>{great?"Hou hou ! Magnifique, tu voles vers le 850 !":"Bien jou\u00e9 ! Chaque essai te rapproche du but."}</div>
        <div style={{fontFamily:"'Fraunces',serif",fontWeight:800,fontSize:20,marginTop:18}}>{unit.title}</div>
        <div className="stat-grid">
          <div className="stat"><div className="v">{correct}/{total}</div><div className="l">Bonnes r\u00e9ponses</div></div>
          <div className="stat"><div className="v">{pct}%</div><div className="l">R\u00e9ussite</div></div>
          <div className="stat"><div className="v">+{correct*10}</div><div className="l">XP gagn\u00e9s</div></div>
          <div className="stat"><div className="v">{estScore}</div><div className="l">Score estim\u00e9</div></div>
        </div>
        {great&&<div className="delta">\u2605 Unit\u00e9 ma\u00eetris\u00e9e \u2014 la suivante est d\u00e9bloqu\u00e9e</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:22}}>
          <button className="btn btn-gold" onClick={onHome}>Retour au programme</button>
          <button className="btn btn-ghost" onClick={onReplay}>Refaire cette unit\u00e9</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
